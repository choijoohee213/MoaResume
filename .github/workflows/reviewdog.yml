name: Static Analysis (cppcheck + reviewdog)

on:
  pull_request:
    branches: [ develop, main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  cppcheck-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Install reviewdog
        uses: reviewdog/action-setup@v1.3.0
        with:
          reviewdog_version: latest

      - name: Run cppcheck with reviewdog
        run: |
          find . -name "*.cpp" -o -name "*.h" | xargs cppcheck \
            --enable=warning,style,performance,portability \
            --std=c++14 \
            --template='{file}:{line}:{column}: {severity}: {message}' \
            --suppress=missingIncludeSystem \
            2>&1 | reviewdog \
              -efm="%f:%l:%c: %m" \
              -name="cppcheck" \
              -reporter="github-pr-review" \
              -level="warning" \
              -fail-on-error="false"
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.REVIEWDOG_GITHUB_API_TOKEN }}

      - name: Comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ cppcheck 정적 분석이 완료되었습니다!'
            });