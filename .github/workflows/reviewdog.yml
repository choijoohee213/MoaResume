name: Static Analysis (clang-tidy + reviewdog)

on:
  pull_request:
    branches: [ develop, main ]
jobs:
  clang-tidy-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Qt (optional, if needed for headers)
        run: sudo apt-get install -y qt6-base-dev

      - name: Install reviewdog
        uses: reviewdog/action-setup@v1.3.0
        with:
          reviewdog_version: latest

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Run clang-tidy
        run: |
          echo "Running clang-tidy..."
          set -e
          for file in $(find . -name "*.cpp"); do
          clang-tidy "$file" -p build/Release >> clang_tidy.log || true
          done

      - name: Run reviewdog
        run: |
          reviewdog \
          -name "clang-tidy" \
          -efm="%f:%l:%c: warning: %m" \
          -efm="%f:%l:%c: error: %m" \
          -level warning \
          -fail-on-error=false \
          -filter-mode=diff_context \
          -diff="git diff FETCH_HEAD" \
          -reporter=github-pr-review \
          < clang_tidy.log
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.REVIEWDOG_GITHUB_API_TOKEN }}
