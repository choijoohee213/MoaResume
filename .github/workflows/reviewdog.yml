name: Static Analysis (clang-tidy + reviewdog)

on: [ pull_request ]

jobs:
  clang-tidy-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Run clang-tidy
        run: clang-tidy **/*.cpp -- -std=c++17 > clang-tidy-report.txt || true

      - name: Run reviewdog
        uses: reviewdog/action-setup@v1
        with:
          name: clang-tidy
          reporter: github-pr-review
          fail_on_error: true
          filter_mode: diff_context
          level: warning
          input: clang-tidy-report.txt
