name: Static Analysis (cppcheck + reviewdog)

on:
  pull_request:
    branches: [ develop, main ]

jobs:
  cppcheck-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Install reviewdog
        uses: reviewdog/action-setup@v1.3.0
        with:
          reviewdog_version: latest

      - name: Run cppcheck with reviewdog
        run: |
          find . -type f \( -name "*.cpp" -o -name "*.h" \) \
            -not -path "*/build/*" \
            -not -path "*/.git/*" \
            > files.txt
          
          cppcheck \
            --enable=warning,style,performance,portability \
            --std=c++14 \
            --template='{file}:{line}:{column}: {severity}: {message}' \
            --suppress=missingIncludeSystem \
            --file-list=files.txt \
            2> cppcheck.log || true
          
          ERROR_COUNT=$(grep -c "error:" cppcheck.log || echo 0)
          WARNING_COUNT=$(grep -c "warning:" cppcheck.log || echo 0)
          STYLE_COUNT=$(grep -c "style:" cppcheck.log || echo 0)
          
          echo "errors=$ERROR_COUNT" >> $GITHUB_OUTPUT
          echo "warnings=$WARNING_COUNT" >> $GITHUB_OUTPUT
          echo "styles=$STYLE_COUNT" >> $GITHUB_OUTPUT
          
          # reviewdog 실행
          cat cppcheck.log | reviewdog \
            -efm="%f:%l:%c: %m" \
            -name="cppcheck" \
            -reporter="github-pr-review" \
            -filter-mode="diff_context" \
            -fail-on-error="false" \
            -level="warning"
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.REVIEWDOG_GITHUB_API_TOKEN }}

      - name: Post summary comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const errors = '${{ steps.cppcheck.outputs.errors }}';
            const warnings = '${{ steps.cppcheck.outputs.warnings }}';
            const styles = '${{ steps.cppcheck.outputs.styles }}';
            
            const totalIssues = parseInt(errors) + parseInt(warnings) + parseInt(styles);
            
            let body = '## 🔍 정적 분석 결과\n\n';
            
            if (totalIssues === 0) {
              body += '✅ **축하합니다!** 모든 검사를 통과했습니다.\n\n';
              body += '발견된 이슈: **0개**';
            } else {
              body += '⚠️ 일부 이슈가 발견되었습니다:\n\n';
              body += `- 🔴 Errors: **${errors}**\n`;
              body += `- 🟡 Warnings: **${warnings}**\n`;
              body += `- 🔵 Style issues: **${styles}**\n\n`;
              body += `**총 ${totalIssues}개** 이슈\n\n`;
              body += '자세한 내용은 위의 인라인 코멘트를 확인해주세요.';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });